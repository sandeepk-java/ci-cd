Name: Build

on:
  workflow dispatch:
    inputs:
      build_type:
        description: 'Select the build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      java_version:
        description: 'Enter the Java version to use (e.g., 17, 18, 19)'
        required: true
        default: '21'
        type: number

permissions:
  contents: read
  id-token: write
  pull-requests: write

Build:
  runs-on: ubuntu-latest
  steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JAVA
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: ${{ github.event.inputs.java_version }}

    - name: Set up Maven
      uses: actions/setup-maven@v3

    - name: Echo Java version
      run: java -version

    - name: Echo Maven version
      run: mvn -version